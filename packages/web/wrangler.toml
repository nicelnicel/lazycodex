main = ".open-next/worker.js"
name = "lazycodex-web"
compatibility_date = "2026-05-25"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[routes]]
pattern = "lazycodex.ai"
custom_domain = true

[[routes]]
pattern = "www.lazycodex.ai"
custom_domain = true
