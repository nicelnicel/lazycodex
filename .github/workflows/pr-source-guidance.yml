name: PR source guidance

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close-with-source-guidance:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR with source repository guidance
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          body="$(mktemp)"
          cat > "$body" <<'MARKDOWN'
          Thanks for the PR! This repository is a generated distribution mirror, so PRs here cannot be merged. Please open your PR against [oh-my-openagent](https://github.com/code-yeongyu/oh-my-openagent) instead.
          MARKDOWN

          gh pr close "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --comment "$(cat "$body")"
